name: EasyReader
options:
  bundleIdPrefix: com.larryhudson
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: WM6HKLP7BJ
    CODE_SIGN_STYLE: Automatic
targets:
  EasyReader:
    type: application
    platform: iOS
    sources: [EasyReader]
    info:
      path: EasyReader/Info.plist
      properties:
        CFBundleDisplayName: Easy Reader
        UILaunchScreen: {}
        UIBackgroundModes: [audio]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.larryhudson.EasyReader
    scheme:
      testTargets: []
    dependencies:
      - target: EasyReaderShare
    entitlements:
      path: EasyReader/EasyReader.entitlements
  EasyReaderShare:
    type: app-extension
    platform: iOS
    sources: [EasyReaderShare]
    info:
      path: EasyReaderShare/Info.plist
      properties:
        CFBundleDisplayName: Easy Reader
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.larryhudson.EasyReader.Share
        SKIP_INSTALL: YES
    entitlements:
      path: EasyReaderShare/EasyReaderShare.entitlements
